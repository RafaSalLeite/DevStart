<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DevStart</title>
  <meta name="description" content="Acesse sua conta DevStart.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <a href="index.html" class="logo" style="justify-content: center;">
        <div class="logo-icon">&lt;/&gt;</div>
        <span>DevStart</span>
      </a>
      <h1>Bem-vindo de volta</h1>
      <p class="subtitle">Entre na sua conta para continuar aprendendo</p>

      <form>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Sua senha">
        </div>
        <div style="text-align: center; margin-bottom: 1rem;">
          <a href="#" class="form-link">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Entrar</button>
      </form>

      <p class="form-footer">Ainda não tem conta? <a href="#" class="form-link">Cadastre-se grátis</a></p>
    </div>
  </div>

</body>
</html>
